<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freeze 動作資料庫</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --teal:   #0f6e56; --teal-bg:   #e1f5ee; --teal-bd:   #5dcaa5;
    --amber:  #633806; --amber-bg:  #faeeda; --amber-bd:  #ef9f27;
    --coral:  #712b13; --coral-bg:  #faece7; --coral-bd:  #f0997b;
    --purple: #3c3489; --purple-bg: #eeedfe; --purple-bd: #afa9ec;
    --blue:   #0c447c; --blue-bg:   #e6f1fb; --blue-bd:   #85b7eb;
    --r: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816; --surface: #242422; --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #e8e6e0; --text2: #a8a8a0; --text3: #68685e;
      --teal:   #9fe1cb; --teal-bg:   #04342c; --teal-bd:   #0f6e56;
      --amber:  #fac775; --amber-bg:  #412402; --amber-bd:  #854f0b;
      --coral:  #f0997b; --coral-bg:  #4a1b0c; --coral-bd:  #993c1d;
      --purple: #cecbf6; --purple-bg: #26215c; --purple-bd: #534ab7;
      --blue:   #b5d4f4; --blue-bg:   #042c53; --blue-bd:   #185fa5;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }

  /* Header */
  .header { padding: 2rem 2rem 1rem; border-bottom: 0.5px solid var(--border); }
  .header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; color: var(--text3); }
  .version-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text3); }

  /* Toolbar */
  .toolbar { padding: 1rem 2rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 0.5px solid var(--border); }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; }
  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .search-wrap { margin-left: auto; }
  .search-wrap input { font-size: 13px; padding: 6px 12px; border-radius: 8px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); width: 200px; outline: none; }
  .search-wrap input:focus { border-color: var(--text2); }

  /* Stats bar */
  .stats-bar { padding: .6rem 2rem; display: flex; gap: 20px; font-size: 12px; color: var(--text3); border-bottom: 0.5px solid var(--border); }
  .stats-bar b { color: var(--text2); font-weight: 500; }

  /* Grid */
  .grid-wrap { padding: 1.25rem 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1rem; cursor: pointer; transition: border-color .15s, transform .1s; }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; font-weight: 500; }
  .badge-beginner    { background: var(--teal-bg);   color: var(--teal);   border: 0.5px solid var(--teal-bd); }
  .badge-intermediate{ background: var(--amber-bg);  color: var(--amber);  border: 0.5px solid var(--amber-bd); }
  .badge-advanced    { background: var(--coral-bg);  color: var(--coral);  border: 0.5px solid var(--coral-bd); }
  .support-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .stag { font-size: 11px; padding: 2px 7px; border-radius: 5px; background: var(--surface2); color: var(--text2); }
  .pwr-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .pwr-label { font-size: 11px; color: var(--text3); width: 30px; }
  .pwr-bar-bg { flex: 1; height: 4px; border-radius: 2px; background: var(--surface2); overflow: hidden; }
  .pwr-bar-fill { height: 100%; border-radius: 2px; }
  .pwr-val { font-size: 11px; color: var(--text2); font-weight: 500; min-width: 24px; text-align: right; }
  .source-tag { font-size: 10px; color: var(--text3); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
  .source-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .source-estimated { background: var(--amber-bd); }
  .source-measured  { background: var(--teal-bd); }

  /* Empty state */
  .empty { padding: 3rem; text-align: center; color: var(--text3); grid-column: 1/-1; }

  /* Detail panel */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; overflow-y: auto; padding: 2rem 1rem; }
  .detail-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .detail-panel { background: var(--surface); border-radius: 14px; border: 0.5px solid var(--border); width: 100%; max-width: 560px; padding: 1.5rem; margin: auto; }
  .detail-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .detail-name { font-size: 20px; font-weight: 600; }
  .close-btn { background: var(--surface2); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
  .sec { margin-bottom: 1.1rem; }
  .sec-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 6px; background: var(--surface2); color: var(--text2); }
  .muscle-tag { background: var(--purple-bg); color: var(--purple); border: 0.5px solid var(--purple-bd); }
  .variant-tag { background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue-bd); }
  .pwr-detail-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .pwr-detail-label { font-size: 12px; color: var(--text2); width: 60px; }
  .pwr-detail-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
  .pwr-detail-fill { height: 100%; border-radius: 3px; }
  .pwr-detail-val { font-size: 12px; font-weight: 600; min-width: 30px; text-align: right; }
  .pwr-total-row { display: flex; justify-content: space-between; padding-top: 8px; border-top: 0.5px solid var(--border); margin-top: 4px; font-size: 13px; }
  .pwr-total-row span:last-child { font-weight: 700; }
  .step-list { display: flex; flex-direction: column; gap: 7px; }
  .step-item { display: flex; gap: 10px; align-items: flex-start; }
  .step-num { min-width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
  .step-txt { font-size: 13px; color: var(--text2); line-height: 1.6; padding-top: 2px; }
  .note-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text2); line-height: 1.6; border-left: 2px solid var(--border2); }
  .source-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); margin-top: 6px; }
  .edit-btn { margin-top: 1rem; width: 100%; padding: 9px; border-radius: 8px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 13px; transition: background .15s; }
  .edit-btn:hover { background: var(--surface2); }

  /* Edit modal */
  .edit-section { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .edit-field { display: flex; flex-direction: column; gap: 4px; }
  .edit-field label { font-size: 11px; color: var(--text3); }
  .edit-field input, .edit-field select { font-size: 13px; padding: 6px 9px; border-radius: 7px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); outline: none; }
  .edit-field input:focus { border-color: var(--text2); }
  .save-btn { width: 100%; padding: 9px; border-radius: 8px; border: none; background: var(--text); color: var(--bg); cursor: pointer; font-size: 13px; font-weight: 500; margin-top: 8px; transition: opacity .15s; }
  .save-btn:hover { opacity: .85; }
  .saved-msg { text-align: center; font-size: 12px; color: var(--teal); margin-top: 6px; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Freeze 動作資料庫</h1>
    <span class="version-tag">v1.0</span>
  </div>
  <div class="header-sub">Breaking — 基礎 Freeze 動作 · 支撐點 · 肌群 · 功率指標</div>
</div>

<div class="toolbar">
  <button class="filter-btn active" onclick="setDiff('all',this)">全部</button>
  <button class="filter-btn" onclick="setDiff('beginner',this)">入門</button>
  <button class="filter-btn" onclick="setDiff('intermediate',this)">中階</button>
  <button class="filter-btn" onclick="setDiff('advanced',this)">進階</button>
  <div class="search-wrap">
    <input type="text" id="sq" placeholder="搜尋動作、肌群…" oninput="renderGrid()">
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="detail-overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
const diffLabel = { beginner:'入門', intermediate:'中階', advanced:'進階' };
const pwrColors = { upper_limb:'#378ADD', core:'#7F77DD', lower_limb:'#1D9E75', balance:'#D85A30' };
const pwrNames  = { upper_limb:'上肢', core:'核心', lower_limb:'下肢', balance:'平衡' };

let db = [];
let activeDiff = 'all';
let currentId = null;
let showEdit = false;

async function loadDB() {
  try {
    const res = await fetch('moves_db.json');
    const json = await res.json();
    db = json.moves;
  } catch(e) {
    db = FALLBACK_DB;
  }
  renderGrid();
}

function setDiff(d, btn) {
  activeDiff = d;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('sq').value.toLowerCase();
  const filtered = db.filter(m => {
    if (activeDiff !== 'all' && m.difficulty !== activeDiff) return false;
    if (q && !m.name.toLowerCase().includes(q) &&
            !m.muscles.join().toLowerCase().includes(q) &&
            !m.support_points.join().toLowerCase().includes(q)) return false;
    return true;
  });

  const estimated = filtered.filter(m => m.power_index.source === 'estimated').length;
  const measured  = filtered.filter(m => m.power_index.source === 'measured').length;
  document.getElementById('stats-bar').innerHTML =
    `<span>顯示 <b>${filtered.length}</b> 個動作</span>` +
    `<span><span class="source-dot source-measured" style="display:inline-block;margin-right:3px"></span>實測 <b>${measured}</b></span>` +
    `<span><span class="source-dot source-estimated" style="display:inline-block;margin-right:3px"></span>預估 <b>${estimated}</b></span>`;

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">沒有符合條件的動作</div>';
    return;
  }

  document.getElementById('grid').innerHTML = filtered.map(m => {
    const pi = m.power_index;
    const barColor = pi.total >= 70 ? '#D85A30' : pi.total >= 50 ? '#EF9F27' : '#1D9E75';
    return `<div class="card" onclick="showDetail(${m.id})">
      <div class="card-head">
        <span class="card-name">${m.name}</span>
        <span class="badge badge-${m.difficulty}">${diffLabel[m.difficulty]}</span>
      </div>
      <div class="support-row">${m.support_points.map(s=>`<span class="stag">${s}</span>`).join('')}</div>
      <div class="pwr-row">
        <span class="pwr-label">功率</span>
        <div class="pwr-bar-bg"><div class="pwr-bar-fill" style="width:${pi.total}%;background:${barColor}"></div></div>
        <span class="pwr-val">${pi.total}</span>
      </div>
      <div class="support-row">${m.muscles.slice(0,3).map(s=>`<span class="stag">${s}</span>`).join('')}${m.muscles.length>3?`<span class="stag">+${m.muscles.length-3}</span>`:''}</div>
      <div class="source-tag">
        <span class="source-dot ${pi.source === 'measured' ? 'source-measured' : 'source-estimated'}"></span>
        ${pi.source === 'measured' ? `實測 · ${pi.measured_at||''}` : '預估值 — 待實測回填'}
      </div>
    </div>`;
  }).join('');
}

function showDetail(id) {
  currentId = id;
  showEdit = false;
  const m = db.find(x => x.id === id);
  renderDetail(m);
  document.getElementById('overlay').classList.add('open');
}

function renderDetail(m) {
  const pi = m.power_index;
  const pwrRows = Object.entries(pwrNames).map(([k,label]) => `
    <div class="pwr-detail-row">
      <span class="pwr-detail-label">${label}</span>
      <div class="pwr-detail-bar"><div class="pwr-detail-fill" style="width:${pi[k]}%;background:${pwrColors[k]}"></div></div>
      <span class="pwr-detail-val" style="color:${pwrColors[k]}">${pi[k]}</span>
    </div>`).join('');

  const editSection = showEdit ? `
    <div class="edit-section">
      <div class="sec-label">回填實測數據</div>
      <div class="edit-grid">
        <div class="edit-field"><label>上肢功率</label><input type="number" id="ei-ul" min="0" max="100" value="${pi.upper_limb}"></div>
        <div class="edit-field"><label>核心功率</label><input type="number" id="ei-co" min="0" max="100" value="${pi.core}"></div>
        <div class="edit-field"><label>下肢功率</label><input type="number" id="ei-ll" min="0" max="100" value="${pi.lower_limb}"></div>
        <div class="edit-field"><label>平衡指數</label><input type="number" id="ei-ba" min="0" max="100" value="${pi.balance}"></div>
      </div>
      <div class="edit-grid">
        <div class="edit-field"><label>測量日期</label><input type="date" id="ei-date" value="${pi.measured_at||''}"></div>
        <div class="edit-field"><label>測量者</label><input type="text" id="ei-by" placeholder="教練姓名" value="${pi.measured_by||''}"></div>
      </div>
      <div class="edit-field" style="margin-bottom:8px"><label>影片連結</label><input type="text" id="ei-video" placeholder="https://..." value="${m.video_url||''}"></div>
      <button class="save-btn" onclick="saveData(${m.id})">儲存實測數據</button>
      <div class="saved-msg" id="saved-msg">已儲存！請手動更新 moves_db.json</div>
    </div>` : '';

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-top">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="detail-name">${m.name}</span>
        <span class="badge badge-${m.difficulty}">${diffLabel[m.difficulty]}</span>
      </div>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>

    <div class="sec">
      <div class="sec-label">支撐點</div>
      <div class="tag-row">${m.support_points.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
    </div>

    <div class="sec">
      <div class="sec-label">功率指標（0–100）</div>
      ${pwrRows}
      <div class="pwr-total-row">
        <span>綜合功率指數</span>
        <span>${pi.total}</span>
      </div>
      <div class="source-info">
        <span class="source-dot ${pi.source==='measured'?'source-measured':'source-estimated'}"></span>
        ${pi.source === 'measured'
          ? `實測數據 · ${pi.measured_at} · ${pi.measured_by}`
          : '目前為預估值，等待拍攝分析後回填'}
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">主要肌群</div>
      <div class="tag-row">${m.muscles.map(s=>`<span class="tag muscle-tag">${s}</span>`).join('')}</div>
    </div>

    <div class="sec">
      <div class="sec-label">教學步驟</div>
      <div class="step-list">${m.steps.map((s,i)=>`
        <div class="step-item">
          <span class="step-num">${i+1}</span>
          <span class="step-txt">${s}</span>
        </div>`).join('')}
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">變化型</div>
      <div class="tag-row">${m.variants.map(s=>`<span class="tag variant-tag">${s}</span>`).join('')}</div>
    </div>

    <div class="sec">
      <div class="sec-label">備注</div>
      <div class="note-box">${m.note}</div>
    </div>

    <button class="edit-btn" onclick="toggleEdit(${m.id})">
      ${showEdit ? '收起' : '回填實測數據 ↓'}
    </button>
    ${editSection}
  `;
}

function toggleEdit(id) {
  showEdit = !showEdit;
  renderDetail(db.find(x => x.id === id));
}

function saveData(id) {
  const m = db.find(x => x.id === id);
  const ul = parseInt(document.getElementById('ei-ul').value);
  const co = parseInt(document.getElementById('ei-co').value);
  const ll = parseInt(document.getElementById('ei-ll').value);
  const ba = parseInt(document.getElementById('ei-ba').value);
  const dt = document.getElementById('ei-date').value;
  const by = document.getElementById('ei-by').value;
  const vd = document.getElementById('ei-video').value;

  m.power_index.upper_limb = ul;
  m.power_index.core = co;
  m.power_index.lower_limb = ll;
  m.power_index.balance = ba;
  m.power_index.total = Math.round((ul + co + ll + ba) / 4);
  m.power_index.source = 'measured';
  m.power_index.measured_at = dt;
  m.power_index.measured_by = by;
  if (vd) m.video_url = vd;

  // 顯示 JSON 供複製
  const json = JSON.stringify({ moves: db }, null, 2);
  const blob = new Blob([JSON.stringify({ version:"1.0", last_updated: new Date().toISOString().slice(0,10), category:"freeze", moves: db }, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'moves_db.json';
  a.click();

  document.getElementById('saved-msg').style.display = 'block';
  renderGrid();
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  showEdit = false;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeDetail();
}

// Fallback data if fetch fails (standalone mode)
const FALLBACK_DB = [
  { id:1, name:"Baby Freeze", difficulty:"beginner", support_points:["手肘","頭側"], muscles:["三角肌","肱三頭肌","腹橫肌","髖屈肌"], power_index:{ upper_limb:30, core:40, lower_limb:20, balance:60, total:38, source:"estimated", measured_at:null, measured_by:null }, steps:["雙膝跪地，雙手撐地","右手肘彎曲，讓頭側靠在右手肘上","左手撐地保持平衡","慢慢讓雙腳離地，保持靜止","收緊核心維持3秒以上"], variants:["Double Baby Freeze","Elbow Baby","One Leg Baby"], note:"最推薦入門的 Freeze，手肘作為支點能大幅降低平衡難度。重心要壓低，不要聳肩。", video_url:"" },
  { id:2, name:"Chair Freeze", difficulty:"intermediate", support_points:["單手肘","腰側"], muscles:["肱三頭肌","前鋸肌","腹斜肌","臀中肌"], power_index:{ upper_limb:55, core:65, lower_limb:30, balance:70, total:55, source:"estimated", measured_at:null, measured_by:null }, steps:["側身，右手肘彎曲頂住右側腰部","左手撐地輔助平衡","核心收緊，讓身體側向離地","雙腳可伸直或彎曲","保持頭部放鬆，眼睛看地板"], variants:["High Chair","One Arm Chair","Chair to Headstand"], note:"手肘頂腰的位置非常關鍵，約在腰骨上方。初學者可先靠牆練習找到重心點。", video_url:"" },
